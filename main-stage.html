<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Roller - Shared Stage</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
</head>
<body class="main-stage-body">
  <div id="stage-app">
    <header class="stage-header">
      <span class="dice-icon">&#127922;</span>
      <h1>Dice Roller</h1>
      <p class="stage-subtitle">Shared Roll Log &mdash; visible to all participants</p>
      <p class="meeting-code">Room: <span id="meeting-id">connecting...</span></p>
    </header>

    <div class="roll-feed">
      <h2>Roll History</h2>
      <ul id="roll-list" class="roll-list"></ul>
      <p id="empty-msg" class="empty-msg">Waiting for rolls... Roll dice in your side panel!</p>
    </div>
  </div>

  <script type="module" src="main-stage.js"></script>
</body>
</html>
