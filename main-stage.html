<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Roller - Main Stage</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
</head>
<body class="main-stage-body">
  <div id="stage-app">
    <header class="stage-header">
      <span class="dice-icon">&#127922;</span>
      <h1>Dice Roller</h1>
      <p class="stage-subtitle">Shared Roll Log &mdash; visible to all participants</p>
    </header>

    <div id="latestRoll" class="latest-roll" hidden>
      <div class="latest-label">Latest Roll</div>
      <div class="latest-who" id="latestWho"></div>
      <div class="latest-expr" id="latestExpr"></div>
      <div class="latest-total" id="latestTotal"></div>
      <div class="latest-detail" id="latestDetail"></div>
    </div>

    <section class="stage-history">
      <h2>Roll Log</h2>
      <ul id="stageHistoryList" class="history-list stage-list">
        <li class="empty-history">No rolls yet. Open the side panel to roll!</li>
      </ul>
    </section>
  </div>

  <script src="dice.js"></script>
  <script src="main-stage.js"></script>
</body>
</html>
